<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forgot Password | Avengers WikiVerse</title>

<link rel="stylesheet" href="./forgot-password.css?v=20260612-34">

<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet">

</head>
<body>

<div class="forgot-container">

    <div class="forgot-card">

        <img
        src="../../assets/images/logo/logoo.jpg"
        alt="Logo"
        class="logo">

        <h1>
            Forgot Password
        </h1>

        <p>
            Enter your email address and we'll send you a password reset link.
        </p>

        <form id="forgotForm">

            <div class="input-group">

                <label>Email</label>

                <input
                type="email"
                id="email"
                placeholder="Enter your email"
                required>

            </div>

            <div class="input-group">

                <label>New Password</label>

                <input
                type="password"
                id="password"
                placeholder="Enter new password"
                required>

            </div>

            <div class="input-group">

                <label>Confirm Password</label>

                <input
                type="password"
                id="confirmPassword"
                placeholder="Confirm new password"
                required>

            </div>

            <button type="submit">

                Reset Password

            </button>

        </form>

        <a
        href="../login/login.html"
        class="back-link">

            Back to Login

        </a>

    </div>

</div>

<script src="../../global/app.js?v=20260612-44"></script>
<script src="./forgot-password.js?v=20260612-16"></script>

</body>
</html>
