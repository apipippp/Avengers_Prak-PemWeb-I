<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Add Movie | Avengers WikiVerse</title>

<link rel="stylesheet" href="../../css/global.css?v=20260612-34">
<link rel="stylesheet" href="./admin-add-movie.css?v=20260612-38">

<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet">

</head>
<body>

<div class="container">

    <aside class="sidebar">

        <div class="sidebar-logo">

            <img
            src="../../assets/images/logo/logoo.jpg"
            alt="Logo">

            <span>
                AVENGERS WIKIVERSE
            </span>

        </div>

        <nav></nav>

    </aside>

    <main class="content">

        <div class="page-header">

            <a href="../admin-manage-movies/admin-manage-movies.html" class="back-btn-link">← Back</a>

            <h1>
                Add New Movie
            </h1>

            <p>
                Add MCU movie into archive
            </p>

        </div>

        <form class="movie-form">

            <div class="upload-area">

                <img
                id="previewMovie"
                src="../../assets/images/placeholders/movie.svg"
                alt="Movie Poster">

                <input
                type="file"
                id="movieImage"
                accept="image/*">

                <label
                for="movieImage"
                class="upload-btn">

                    Upload Poster

                </label>

            </div>

            <div class="form-group">

                <label>
                    Movie Title
                </label>

                <input
                name="title"
                type="text"
                placeholder="Avengers Endgame">

            </div>

            <div class="form-group">

                <label>
                    Release Date
                </label>

                <input
                name="releaseDate"
                type="date">

            </div>

            <div class="form-group">

                <label>
                    Duration
                </label>

                <input
                name="duration"
                type="text"
                placeholder="181 Minutes">

            </div>

            <div class="form-group">

                <label>
                    Director
                </label>

                <input
                name="director"
                type="text"
                placeholder="Russo Brothers">

            </div>

            <div class="form-group">

                <label>
                    Cast Members
                </label>

                <textarea
                name="castMembers"
                placeholder="Robert Downey Jr, Chris Evans, Scarlett Johansson"></textarea>

            </div>

            <div class="form-group">

                <label>
                    Synopsis
                </label>

                <textarea
                name="synopsis"
                placeholder="Movie synopsis..."></textarea>

            </div>

            <button
            type="submit"
            class="submit-btn">

                Save Movie

            </button>

            <a href="../admin-manage-movies/admin-manage-movies.html" class="cancel-btn">Cancel</a>

        </form>

    </main>

</div>

<script src="../../global/app.js?v=20260612-44"></script>
<script src="./admin-add-movie.js?v=20260612-40"></script>

</body>
</html>
